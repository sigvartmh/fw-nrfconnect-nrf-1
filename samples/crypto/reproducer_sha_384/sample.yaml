sample:
  name: SHA-384 SSF psa_call hang reproducer
  description: |
    Minimal reproducer for the IronSide SE psa_call hang observed during
    the TLS 1.3 SHA-384 transcript-hash finalize (no networking required).
tests:
  sample.reproducer_sha_384:
    sysbuild: true
    platform_allow:
      - nrf54h20dk/nrf54h20/cpuapp
    integration_platforms:
      - nrf54h20dk/nrf54h20/cpuapp
    harness: console
    harness_config:
      type: multi_line
      ordered: true
      regex:
        - "All iterations completed"
    timeout: 120
