CONFIG_LOG=y
CONFIG_PRINTK=y
# Immediate mode so the last log line before a hang is not lost
CONFIG_LOG_MODE_IMMEDIATE=y

# Match the failing psa_tls build
CONFIG_MAIN_STACK_SIZE=8192
CONFIG_SPEED_OPTIMIZATIONS=y

# PSA crypto through the IronSide SE / SSF client, as in psa_tls on nrf54h20
CONFIG_PSA_CRYPTO=y
CONFIG_PSA_SSF_CRYPTO_CLIENT=y
CONFIG_PSA_CRYPTO_DRIVER_OBERON=n
CONFIG_PSA_WANT_ALG_SHA_256=y
CONFIG_PSA_WANT_ALG_SHA_384=y
CONFIG_PSA_WANT_ALG_HKDF_EXTRACT=y
CONFIG_PSA_WANT_ALG_HKDF_EXPAND=y
